<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WYSIWYG HTML Editor</title>
  <link rel="stylesheet" href="https://cdn.ckeditor.com/ckeditor5/47.6.1/ckeditor5.css" crossorigin>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div class="main-container">
    <div class="editor-container editor-container_document-editor editor-container_include-style editor-container_include-fullscreen">
      <div class="editor-container__menu-bar" id="editor-menu-bar"></div>
      <div class="editor-container__toolbar" id="editor-toolbar"></div>
      <div class="editor-container__editor-wrapper">
        <div class="editor-container__editor">
          <div id="editor"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Load CKEditor 5 from CDN -->
  <script src="https://cdn.ckeditor.com/ckeditor5/47.6.1/ckeditor5.umd.js" crossorigin></script>
  <script src="https://cdn.ckeditor.com/ckeditor5/47.6.1/translations/fr.umd.js" crossorigin></script>
  
  <!-- Load editor initialization script -->
  <script src="src/editor.js"></script>
</body>
</html>
